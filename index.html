<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시간표</title>
  <!-- 테두리 -->
  <style>
    table { border-collapse: collapse; }
    th, td { border: 1px solid #999; }
  </style>
</head>
<body>

<!--드롭다운 -->
  <div>
    <select id="date" name="date">
      <option value="2026-05-25">26-05-25 ~ 26-05-30</option>
      <option value="2026-05-18">26-05-18 ~ 26-05-23</option>
      <option value="2026-06-01">26-06-01 ~ 26-06-06</option>
    </select>

    <label for="class">반</label>
    <!-- ㄷㄹㄷㅇ-->
    <select id="class" name="class">
      <option value="2-1">2-1</option>
      <option value="2-2">2-2</option>
      <option value="2-3">2-3</option>
      <option value="2-4">2-4</option>
      <option value="2-5">2-5</option>
      <option value="2-6" selected>2-6</option>
    </select>
  </div>

<!--버튼+제목 -->
  <div>
    <button type="button">◀</button>
    <span>2 학년 <span id="title-class">6</span> 반 시간표</span>
    <button type="button">▶</button>
  </div>

  <script>
    const sel = document.getElementById('class');
    sel.addEventListener('change', function() {
      document.getElementById('title-class').textContent = this.value.split('-')[1];
    });
  </script>

<!--표-->
  <table>
    <thead>
      <tr>
        <th>교시</th>
        <th>월 (nn일)</th>
        <th>화 (nn일)</th>
        <th>수 (nn일)</th>
        <th>목 (nn일)</th>
        <th>금 (nn일)</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1(08:50)</td>
        <td></td><td></td><td></td><td></td><td></td>
      </tr>
      <tr>
        <td>2(09:50)</td>
        <td></td><td></td><td></td><td></td><td></td>
      </tr>
      <tr>
        <td>3(10:50)</td>
        <td></td><td></td><td></td><td></td><td></td>
      </tr>
      <tr>
        <td>4(11:50)</td>
        <td></td><td></td><td></td><td></td><td></td>
      </tr>
      <tr>
        <td>5(13:40)</td>
        <td></td><td></td><td></td><td></td><td></td>
      </tr>
      <tr>
        <td>6(14:40)</td>
        <td></td><td></td><td></td><td></td><td></td>
      </tr>
      <tr>
        <td>7(15:40)</td>
        <td></td><td></td><td></td><td></td><td></td>
      </tr>
    </tbody>
  </table>

</body>
</html>
