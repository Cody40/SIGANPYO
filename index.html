<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시간표</title>
  <link rel="stylesheet" href="style.css">
  <script src="main.js" defer></script>
</head>
<body>
<div id="date_div">
  <!-- json 읽고 가능한 주 찾기, 아직 안함 -->
  <select id="date" name="date">
    <option value="2026-05-25">26-05-25 ~ 26-05-30</option>
    <option value="2026-05-18">26-05-18 ~ 26-05-23</option>
    <option value="2026-06-01">26-06-01 ~ 26-06-06</option>
  </select>

  <p style="margin-left: 5px; margin-right: 5px;">-</p>
  <!-- json에서 학년당 몇 반인지 읽고 컨트롤-->
    <select id="grade_dd" name="grade">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
  </select>
  <p>학년</p>
  <select id="class_dd">
  </select>
  <p>반</p>
</div>

<!--버튼+제목 -->
<div id="btn_class_btn">
  <button type="button">◀</button>
  <span id="title_grade">1</span>학년 <span id="title_class">1</span>반 시간표
  <button type="button">▶</button>
</div>

<!--표-->
<div id="ttable">
  <table>
    <thead>
      <tr>
        <th>교시</th>
        <th>월 (nn일)</th>
        <th>화 (nn일)</th>
        <th>수 (nn일)</th>
        <th>목 (nn일)</th>
        <th>금 (nn일)</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1(08:50)</td>
        <td></td><td></td><td></td><td></td><td></td>
      </tr>
      <tr>
        <td>2(09:50)</td>
        <td></td><td></td><td></td><td></td><td></td>
      </tr>
      <tr>
        <td>3(10:50)</td>
        <td></td><td></td><td></td><td></td><td></td>
      </tr>
      <tr>
        <td>4(11:50)</td>
        <td></td><td></td><td></td><td></td><td></td>
      </tr>
      <tr>
        <td>5(13:40)</td>
        <td></td><td></td><td></td><td></td><td></td>
      </tr>
      <tr>
        <td>6(14:40)</td>

      </tr>
      <tr>
        <td>7(15:40)</td>
        <td></td><td></td><td></td><td></td><td></td>
      </tr>
    </tbody>
  </table>
</div>
</body>
</html>
