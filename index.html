<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시간표</title>
  <link rel="stylesheet" href="style.css">
  <script src="main.js" type="module"></script>
</head>
<body>

<div id="modal_bg" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:10;">
  <div style="background:white; margin:100px auto; padding:20px; width:300px;">
    <p><b>주 선택</b></p>
    <select id="date" style="width:100%; margin-bottom:10px;">
    </select>

    <p><b>학년 선택</b></p>
    <select id="grade_dd" name="grade" style="width:100%; margin-bottom:10px;">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
    </select>

    <p><b>반 선택</b></p>
    <select id="class_dd" style="width:100%; margin-bottom:10px;">
    </select>

    <br>
    <button type="button" onclick="closeModal()">닫기</button>
  </div>
</div>

<div id="wrapper">

  <!--설정 버튼+제목 -->
  <div id="top_area">
    <b><span id="title_grade">1</span>학년 <span id="title_class">1</span>반 시간표</b>
    <button type="button" onclick="openModal()">설정</button>
  </div>

  <!--표-->
  <div id="ttable">
    <table>
      <thead>
        <tr>
          <th>교시</th>
          <th>월 (nn일)</th>
          <th>화 (nn일)</th>
          <th>수 (nn일)</th>
          <th>목 (nn일)</th>
          <th>금 (nn일)</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td id="lgbtq"><b>1<br>(08:50)</td>
          <td></td><td></td><td></td><td></td><td></td>
        </tr>
        <tr>
          <td id="lgbtq"><b>2<br>(09:50)</td>
          <td></td><td></td><td></td><td></td><td></td>
        </tr>
        <tr>
          <td id="lgbtq"><b>3<br>(10:50)</td>
          <td></td><td></td><td></td><td></td><td></td>
        </tr>
        <tr>
          <td id="lgbtq"><b>4<br>(11:50)</td>
          <td></td><td></td><td></td><td></td><td></td>
        </tr>
        <tr>
          <td id="lgbtq"><b>5<br>(13:40)</td>
          <td></td><td></td><td></td><td></td><td></td>
        </tr>
        <tr>
          <td id="lgbtq"><b>6<br>(14:40)</td>
          <td></td><td></td><td></td><td></td><td></td>
        </tr>
        <tr>
          <td id="lgbtq"><b>7<br>(15:40)</td>
          <td></td><td></td><td></td><td></td><td></td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
</body>
</html>
